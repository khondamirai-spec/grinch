name: studyflow
description: StudyFlow - A student-focused daily task manager
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Audio Playback
  just_audio: ^0.9.36
  audio_session: ^0.1.18
  
  # File Handling
  file_picker: ^6.1.1
  url_launcher: ^6.2.4
  
  # PDF Viewing
  pdfx: ^2.6.0
  
  # Routing
  go_router: ^13.0.1
  
  # UUID Generation
  uuid: ^4.3.3
  
  # UI
  google_fonts: ^6.1.0
  fl_chart: ^0.66.2
  
  # Utils
  intl: ^0.19.0
  path_provider: ^2.1.2
  image_picker: ^1.0.7
  
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
